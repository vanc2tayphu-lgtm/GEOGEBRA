<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGebra AI Studio Pro - v11.7 (Stable Production)</title>
    <!-- Thư viện CDN chuẩn - Không cần build -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.geogebra.org/apps/deployggb.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .ggb-container-outer { border-radius: 2.5rem; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border: 8px solid white; background: #ffffff; }
        input[type="range"] { accent-color: #4f46e5; }
        .shimmer { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, memo } = React;

        const HISTORY_STORAGE_KEY = "geogebra_ai_history_v11_7";
        const API_KEY_STORAGE_KEY = "geogebra_gemini_api_key_v11_7";

        // --- SIÊU BỘ LỌC HYPER-VALIDATOR v11.7 ---
        function hyperValidator(commands) {
            if (!Array.isArray(commands)) return [];
            return commands.map((raw) => {
                let fixed = String(raw || "").trim();
                
                // 1. Sửa lỗi boolean True/False -> true/false
                fixed = fixed.replace(/\[\s*True\s*\]/gi, "[true]")
                             .replace(/\[\s*False\s*\]/gi, "[false]")
                             .replace(/,\s*True\s*([\]\),])/gi, ", true$1")
                             .replace(/,\s*False\s*([\]\),])/gi, ", false$1");

                // 2. Chặn đặt tên trùng hệ thống
                const reserved = ["TrucTung", "TrucHuanh", "yAxis", "xAxis", "zAxis", "O", "f", "g", "h"];
                reserved.forEach(name => {
                    const regex = new RegExp(`^${name}\\s*=`, "i");
                    if (regex.test(fixed)) {
                        fixed = fixed.replace(regex, `obj_${name}_${Math.floor(Math.random()*1000)}=`);
                    }
                });

                // 3. Triệt tiêu mảnh vụn rác
                if (!fixed || fixed.length === 1 || /^(?:f\(x\)|h\(x\)|z\(x\)|r)$/i.test(fixed)) {
                    return "// SCRAPPED";
                }

                // 4. Dịch thuật lệnh Việt-Anh
                const dict = {
                    Neu: "If", Nếu: "If", HamSo: "Function", HàmSố: "Function",
                    GiaoDiem: "Intersect", GiaoĐiểm: "Intersect", DaGiac: "Polygon",
                    DoanThang: "Segment", MatCong: "Surface", Tron: "Circle", ThucHien: "Execute"
                };
                Object.entries(dict).forEach(([vn, en]) => {
                    if (fixed.toLowerCase().startsWith(vn.toLowerCase())) {
                        fixed = fixed.replace(new RegExp(`^${vn}`, "i"), en);
                    }
                });

                // 5. Chuẩn hóa ngoặc vuông
                const ggbCmds = ["Polygon", "Segment", "Vector", "Text", "Function", "Circle", "Surface", "SetColor", "If", "Intersect", "Point", "Sphere", "Execute", "ShowAxes", "ShowGrid"];
                ggbCmds.forEach((name) => {
                    const regex = new RegExp(`^${name}\\((.*)\\)$`, "i");
                    const match = fixed.match(regex);
                    if (match) fixed = `${name}[${match[1]}]`;
                });

                return fixed;
            }).filter((c) => c && !c.startsWith("//"));
        }

        // --- COMPONENT VÙNG VẼ (Dùng memo để React không re-render gây lỗi DOM) ---
        const GeoGebraView = memo(({ mode, appletReady }) => {
            return (
                <div className="ggb-container-outer relative">
                    <div id="ggb-element" className="w-full h-[700px] bg-slate-50"></div>
                    {!appletReady && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center bg-white/95 z-50 shimmer">
                            <div className="h-16 w-16 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin"></div>
                            <p className="mt-4 text-xs font-black text-slate-400 uppercase tracking-widest">Nạp lõi GeoGebra...</p>
                        </div>
                    )}
                </div>
            );
        });

        function App() {
            const [mode, setMode] = useState("geometry");
            const [query, setQuery] = useState("");
            const [lineThickness, setLineThickness] = useState(3);
            const [isGenerating, setIsGenerating] = useState(false);
            const [lastSummary, setLastSummary] = useState("Hệ thống v11.7 đã sẵn sàng.");
            const [history, setHistory] = useState([]);
            const [apiKey, setApiKey] = useState("");
            const [appletReady, setAppletReady] = useState(false);

            useEffect(() => {
                const savedKey = localStorage.getItem(API_KEY_STORAGE_KEY);
                if (savedKey) setApiKey(savedKey);
                const savedHistory = localStorage.getItem(HISTORY_STORAGE_KEY);
                if (savedHistory) setHistory(JSON.parse(savedHistory));
                
                initApplet();
            }, []);

            useEffect(() => {
                initApplet();
            }, [mode]);

            const initApplet = () => {
                if (!window.GGBApplet) return;
                setAppletReady(false);
                
                // Sử dụng setTimeout để đảm bảo DOM đã sẵn sàng
                setTimeout(() => {
                    const params = {
                        appName: mode === "geometry" ? "classic" : "3d",
                        width: 800,
                        height: 700,
                        showToolBar: true,
                        showAlgebraInput: true,
                        language: "vi",
                        appletOnLoad: (api) => {
                            const perspective = mode === "geometry" ? "AG" : "T";
                            api.evalCommand(`SetPerspective["${perspective}"]`);
                            api.evalCommand("ShowAxes[true]");
                            api.evalCommand("ShowGrid[true]");
                            setAppletReady(true);
                        },
                    };
                    const applet = new window.GGBApplet(params, true);
                    applet.inject("ggb-element");
                }, 100);
            };

            const runAI = async () => {
                const trimmedQuery = query.trim();
                if (!trimmedQuery) return;
                
                if (!apiKey.trim()) {
                    setLastSummary("LỖI: Bạn cần nhập API Key ở cột bên trái.");
                    return;
                }

                setIsGenerating(true);
                setLastSummary("Đang gửi phân tích tới Gemini...");

                try {
                    const is3D = /(khối|3d|không gian|chiều cao|z\s*=)/i.test(trimmedQuery);
                    if (is3D && mode !== "3d") {
                        setMode("3d");
                        await new Promise(r => setTimeout(r, 1500));
                    }

                    const sysPrompt = `Bạn là chuyên gia GeoGebra AI. 
QUY TẮC: Luôn dùng English commands, ngoặc vuông [ ]. Tránh dùng tên đối tượng trùng hệ thống.
Trả về JSON: { "commands": ["Lệnh"], "summary": "Giải thích ngắn" }.`;

                    // FIX: Sử dụng gemini-1.5-flash cho độ ổn định cao nhất trên Vercel
                    const modelName = "gemini-1.5-flash";
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey.trim()}`;
                    
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: trimmedQuery }] }],
                            systemInstruction: { parts: [{ text: sysPrompt }] },
                            generationConfig: { 
                                responseMimeType: "application/json"
                            }
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error?.message || "Lỗi kết nối");
                    }

                    const data = await response.json();
                    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!aiText) throw new Error("AI không phản hồi.");
                    
                    const result = JSON.parse(aiText);
                    const commands = hyperValidator(result.commands || []);

                    const api = window.ggbApplet;
                    if (api) {
                        commands.forEach(c => api.evalCommand(c));
                        
                        setTimeout(() => {
                            api.getAllObjectNames().forEach(n => {
                                if (api.getObjectType(n) === "point") {
                                    api.evalCommand(`SetLabelMode[${n}, 0]`);
                                    if (n.length > 1) api.setVisible(n, false);
                                }
                                if (["line", "segment", "function", "curve"].includes(api.getObjectType(n))) {
                                    api.setLineThickness(n, lineThickness);
                                }
                            });
                        }, 500);

                        setLastSummary(result.summary || "Đã vẽ hoàn tất.");
                        const newHistory = [{ id: Date.now(), prompt: trimmedQuery }, ...history.slice(0, 19)];
                        setHistory(newHistory);
                        localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(newHistory));
                    }
                } catch (e) {
                    setLastSummary(`LỖI: ${e.message}`);
                    console.error(e);
                } finally {
                    setIsGenerating(false);
                }
            };

            const updateKey = (val) => {
                setApiKey(val);
                localStorage.setItem(API_KEY_STORAGE_KEY, val);
            };

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            return (
                <div className="min-h-screen flex flex-col gap-6 p-4 md:p-8">
                    {/* Header */}
                    <header className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div className="flex items-center gap-4">
                            <div className="bg-indigo-600 p-3 rounded-2xl text-white shadow-lg shadow-indigo-100">
                                <i data-lucide="wand-sparkles" className="w-8 h-8"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tight">GeoGebra AI Master</h1>
                                <div className="flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">v11.7 Stable Edition</p>
                                </div>
                            </div>
                        </div>
                        <div className="flex bg-slate-100 p-1.5 rounded-2xl shadow-inner shrink-0">
                            <button onClick={() => setMode("geometry")} className={`px-8 py-2.5 rounded-xl text-xs font-black transition-all ${mode === "geometry" ? "bg-white text-indigo-600 shadow-md" : "text-slate-500 hover:text-slate-800"}`}>2D VIEW</button>
                            <button onClick={() => setMode("3d")} className={`px-8 py-2.5 rounded-xl text-xs font-black transition-all ${mode === "3d" ? "bg-white text-indigo-600 shadow-md" : "text-slate-500 hover:text-slate-800"}`}>3D VIEW</button>
                        </div>
                    </header>

                    <div className="grid gap-8 lg:grid-cols-[380px_1fr]">
                        <aside className="flex flex-col gap-6">
                            {/* API Configuration */}
                            <div className="bg-white p-6 rounded-[2rem] shadow-xl border border-indigo-100 space-y-4">
                                <div className="flex items-center gap-2 text-indigo-900">
                                    <i data-lucide="key" className="w-4 h-4"></i>
                                    <span className="text-[10px] font-black uppercase tracking-widest text-indigo-600">Gemini API Key</span>
                                </div>
                                <input 
                                    type="password" 
                                    value={apiKey} 
                                    onChange={(e) => updateKey(e.target.value)} 
                                    placeholder="Dán API Key tại đây..." 
                                    className="w-full p-4 rounded-2xl border-2 border-slate-100 bg-slate-50 focus:bg-white focus:border-indigo-500 outline-none transition-all text-xs font-mono"
                                />
                                <p className="text-[9px] text-slate-400 font-bold italic px-1 leading-tight">Key được lưu an toàn trong localStorage trình duyệt.</p>
                            </div>

                            {/* Prompt Input */}
                            <div className="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-200 space-y-6">
                                <div className="flex items-center gap-2 text-slate-700">
                                    <i data-lucide="sparkles" className="w-4 h-4 text-indigo-500"></i>
                                    <span className="text-[10px] font-black uppercase tracking-widest text-slate-600">Yêu cầu AI vẽ</span>
                                </div>
                                <textarea 
                                    value={query} 
                                    onChange={(e) => setQuery(e.target.value)} 
                                    placeholder="VD: Vẽ ngôi sao năm cánh màu đỏ, vẽ đồ thị y = 2x - 1..." 
                                    className="w-full min-h-[140px] p-5 rounded-3xl border-2 border-slate-100 bg-slate-50 focus:bg-white focus:ring-8 focus:ring-indigo-500/5 focus:border-indigo-500 outline-none transition-all text-sm font-bold leading-relaxed shadow-inner"
                                />
                                <div className="space-y-3">
                                    <div className="flex justify-between items-center px-1">
                                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-wider">Độ dày nét vẽ</span>
                                        <span className="text-indigo-600 font-black text-xs bg-indigo-50 px-2 py-0.5 rounded-md border border-indigo-100">{lineThickness}px</span>
                                    </div>
                                    <input type="range" min="1" max="13" value={lineThickness} onChange={(e) => setLineThickness(parseInt(e.target.value))} className="w-full" />
                                </div>
                                <button onClick={runAI} disabled={isGenerating} className="w-full h-16 bg-indigo-600 hover:bg-indigo-700 text-white rounded-[1.5rem] font-black shadow-xl shadow-indigo-200 active:scale-95 transition-all flex items-center justify-center gap-3 disabled:bg-slate-300">
                                    {isGenerating ? <div className="w-6 h-6 border-4 border-white/30 border-t-white rounded-full animate-spin"></div> : <i data-lucide="play" className="w-5 h-5 fill-white"></i>}
                                    XỬ LÝ DỰNG HÌNH AI
                                </button>
                            </div>

                            {/* History */}
                            <div className="bg-white rounded-[2rem] shadow-xl border border-slate-200 flex-1 flex flex-col min-h-[250px]">
                                <div className="p-6 border-b border-slate-50 flex justify-between items-center">
                                    <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest">Lịch sử bản vẽ</span>
                                    <button onClick={() => {setHistory([]); localStorage.removeItem(HISTORY_STORAGE_KEY)}} className="text-[9px] font-bold text-red-400 hover:text-red-600 uppercase">Xóa</button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-5 space-y-3 custom-scroll">
                                    {history.map(item => (
                                        <div key={item.id} className="p-4 border border-slate-100 rounded-2xl hover:border-indigo-200 transition-all cursor-pointer bg-slate-50/30 group" onClick={() => setQuery(item.prompt)}>
                                            <p className="text-xs font-bold text-slate-600 line-clamp-2 leading-snug group-hover:text-indigo-600">{item.prompt}</p>
                                        </div>
                                    ))}
                                    {history.length === 0 && <p className="text-[10px] text-slate-300 text-center py-8 italic uppercase tracking-widest">Trống</p>}
                                </div>
                            </div>
                        </aside>

                        <main className="flex flex-col gap-6">
                            <GeoGebraView mode={mode} appletReady={appletReady} />
                            
                            <div className="bg-slate-900 text-white p-6 rounded-[2rem] flex flex-col md:flex-row justify-between items-center gap-6 shadow-2xl border border-slate-800">
                                <div className="flex items-center gap-4">
                                    <div className="bg-slate-800 p-3 rounded-2xl text-indigo-400 shadow-inner">
                                        <i data-lucide="terminal" className="w-6 h-6"></i>
                                    </div>
                                    <div className="flex flex-col">
                                        <span className="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-1">System Console Log</span>
                                        <span className="text-sm font-bold text-slate-200 italic line-clamp-1 tracking-tight">{lastSummary}</span>
                                    </div>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={initApplet} className="bg-slate-800 hover:bg-slate-700 text-slate-300 px-6 py-3 rounded-2xl text-xs font-black transition-all uppercase tracking-tighter active:scale-95">Làm mới view</button>
                                    <button onClick={() => {window.ggbApplet?.newConstruction(); window.ggbApplet?.evalCommand("ShowAxes[true]");}} className="bg-indigo-600 hover:bg-red-500 px-8 py-3 rounded-2xl text-xs font-black transition-all uppercase tracking-tighter shadow-lg shadow-indigo-900/40 active:scale-95">Xóa bảng vẽ</button>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
