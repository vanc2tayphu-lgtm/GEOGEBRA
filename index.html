<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGebra AI Studio Pro - v11.5 (Vercel Ready)</title>
    <!-- Thư viện CDN chuẩn - Không cần build -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.geogebra.org/apps/deployggb.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .ggb-container { border-radius: 2rem; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border: 8px solid white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Lấy các hook từ biến Global React (Vì không dùng import)
        const { useState, useEffect, useRef } = React;

        const HISTORY_STORAGE_KEY = "geogebra_ai_history_v11_5";
        const API_KEY_STORAGE_KEY = "geogebra_gemini_api_key_v11_5";

        // --- SIÊU BỘ LỌC HYPER-VALIDATOR v11.5 ---
        function hyperValidator(commands) {
            if (!Array.isArray(commands)) return [];
            return commands.map((raw) => {
                let fixed = String(raw || "").trim();
                
                // 1. Sửa lỗi boolean True/False -> true/false
                fixed = fixed.replace(/\[\s*True\s*\]/g, "[true]")
                             .replace(/\[\s*False\s*\]/g, "[false]")
                             .replace(/,\s*True\s*([\]\),])/g, ", true$1")
                             .replace(/,\s*False\s*([\]\),])/g, ", false$1");

                // 2. Chặn đặt tên trùng hệ thống (TrụcTùng, TrụcHoành...)
                const reserved = ["TrucTung", "TrucHuanh", "yAxis", "xAxis", "zAxis", "O", "f", "g", "h"];
                reserved.forEach(name => {
                    const regex = new RegExp(`^${name}\\s*=`, "i");
                    if (regex.test(fixed)) {
                        fixed = fixed.replace(regex, `obj_${name}_${Math.floor(Math.random()*1000)}=`);
                    }
                });

                // 3. Triệt tiêu mảnh vụn rác (f, z đứng một mình)
                if (!fixed || /^[a-zA-Z]$/.test(fixed) || /^(?:f\(x\)|h\(x\)|z\(x\)|r)$/i.test(fixed)) {
                    return "// SCRAPPED";
                }

                // 4. Dịch thuật lệnh Việt-Anh tự động
                const dict = {
                    Neu: "If", Nếu: "If", HamSo: "Function", HàmSố: "Function",
                    GiaoDiem: "Intersect", GiaoĐiểm: "Intersect", DaGiac: "Polygon",
                    DoanThang: "Segment", MatCong: "Surface", Tron: "Circle", ThucHien: "Execute"
                };
                Object.entries(dict).forEach(([vn, en]) => {
                    if (fixed.toLowerCase().startsWith(vn.toLowerCase())) {
                        fixed = fixed.replace(new RegExp(`^${vn}`, "i"), en);
                    }
                });

                // 5. Ép dùng ngoặc vuông [ ] cho lệnh GeoGebra
                const ggbCmds = ["Polygon", "Segment", "Vector", "Text", "Function", "Circle", "Surface", "SetColor", "If", "Intersect", "Point", "Sphere", "Execute", "ShowAxes", "ShowGrid"];
                ggbCmds.forEach((name) => {
                    const regex = new RegExp(`^${name}\\((.*)\\)$`, "i");
                    const match = fixed.match(regex);
                    if (match) fixed = `${name}[${match[1]}]`;
                });

                return fixed;
            }).filter((c) => c && !c.startsWith("//"));
        }

        function App() {
            const containerRef = useRef(null);
            const [mode, setMode] = useState("geometry");
            const [query, setQuery] = useState("");
            const [lineThickness, setLineThickness] = useState(3);
            const [isGenerating, setIsGenerating] = useState(false);
            const [lastSummary, setLastSummary] = useState("Hệ thống sẵn sàng.");
            const [history, setHistory] = useState([]);
            const [apiKey, setApiKey] = useState("");

            useEffect(() => {
                const savedKey = localStorage.getItem(API_KEY_STORAGE_KEY);
                if (savedKey) setApiKey(savedKey);
                const savedHistory = localStorage.getItem(HISTORY_STORAGE_KEY);
                if (savedHistory) setHistory(JSON.parse(savedHistory));
                initApplet();
            }, []);

            useEffect(() => {
                initApplet();
            }, [mode]);

            const initApplet = () => {
                if (!window.GGBApplet || !containerRef.current) return;
                containerRef.current.innerHTML = '<div id="ggb-element"></div>';
                const params = {
                    appName: mode === "geometry" ? "classic" : "3d",
                    width: containerRef.current.clientWidth || 800,
                    height: 700,
                    showToolBar: true,
                    showAlgebraInput: true,
                    language: "vi",
                    appletOnLoad: (api) => {
                        const perspective = mode === "geometry" ? "AG" : "T";
                        api.evalCommand(`SetPerspective["${perspective}"]`);
                        api.evalCommand("ShowAxes[true]");
                        api.evalCommand("ShowGrid[true]");
                    },
                };
                const applet = new window.GGBApplet(params, true);
                applet.inject("ggb-element");
            };

            const runAI = async () => {
                if (!query.trim()) return;
                if (!apiKey) {
                    setLastSummary("LỖI: Chưa nhập API Key ở cấu hình.");
                    return;
                }
                setIsGenerating(true);
                try {
                    const is3D = /(khối|3d|không gian|chiều cao|z\s*=)/i.test(query);
                    if (is3D && mode !== "3d") {
                        setMode("3d");
                        await new Promise(r => setTimeout(r, 1500));
                    }

                    const prompt = `Ban la chuyen gia GeoGebra AI. 
QUY TAC: Dung true/false chu thuong. Cam dat ten TrucTung/TrucHuanh.
Tra ve JSON: { "commands": ["Lệnh"], "summary": "Mô tả" }.`;

                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: query }] }],
                            systemInstruction: { parts: [{ text: prompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    const data = await response.json();
                    const result = JSON.parse(data.candidates[0].content.parts[0].text);
                    const commands = hyperValidator(result.commands || []);

                    const api = window.ggbApplet;
                    if (api) {
                        commands.forEach(c => api.evalCommand(c));
                        setTimeout(() => {
                            api.getAllObjectNames().forEach(n => {
                                if (api.getObjectType(n) === "point") {
                                    api.evalCommand(`SetLabelMode[${n}, 0]`);
                                    if (n.length > 1) api.setVisible(n, false);
                                }
                                if (["line", "segment", "function", "curve"].includes(api.getObjectType(n))) {
                                    api.setLineThickness(n, lineThickness);
                                }
                            });
                        }, 500);
                        setLastSummary(result.summary || "Đã vẽ xong.");
                        const newHistory = [{ id: Date.now(), prompt: query }, ...history.slice(0, 19)];
                        setHistory(newHistory);
                        localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify(newHistory));
                    }
                } catch (e) {
                    setLastSummary("Lỗi kết nối AI. Kiểm tra Key!");
                } finally {
                    setIsGenerating(false);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col gap-6">
                    <header className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-4">
                            <div className="bg-indigo-600 p-3 rounded-2xl text-white shadow-lg shadow-indigo-100">
                                <i data-lucide="wand-sparkles" className="w-8 h-8"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tight">GeoGebra AI Master</h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">v11.5 Hybrid-Engine • Enterprise</p>
                            </div>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-2xl">
                            <button onClick={() => setMode("geometry")} className={`px-8 py-2 rounded-xl text-xs font-black transition-all ${mode === "geometry" ? "bg-white text-indigo-600 shadow-md" : "text-slate-500"}`}>2D</button>
                            <button onClick={() => setMode("3d")} className={`px-8 py-2 rounded-xl text-xs font-black transition-all ${mode === "3d" ? "bg-white text-indigo-600 shadow-md" : "text-slate-500"}`}>3D</button>
                        </div>
                    </header>

                    <div className="grid gap-6 lg:grid-cols-[380px_1fr]">
                        <aside className="flex flex-col gap-6">
                            <div className="bg-white p-6 rounded-[2rem] shadow-xl border border-indigo-100 space-y-4">
                                <div className="flex items-center gap-2 text-indigo-900">
                                    <i data-lucide="key" className="w-4 h-4"></i>
                                    <span className="text-[10px] font-black uppercase tracking-widest">API Configuration</span>
                                </div>
                                <input 
                                    type="password" 
                                    value={apiKey} 
                                    onChange={(e) => {setApiKey(e.target.value); localStorage.setItem(API_KEY_STORAGE_KEY, e.target.value);}} 
                                    placeholder="Dán Gemini API Key vào đây..." 
                                    className="w-full p-4 rounded-2xl border-2 border-slate-100 bg-slate-50 focus:bg-white focus:border-indigo-500 outline-none transition-all text-xs font-mono"
                                />
                            </div>

                            <div className="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-200 space-y-6">
                                <div className="flex items-center gap-2 text-slate-700">
                                    <i data-lucide="sparkles" className="w-4 h-4 text-indigo-500"></i>
                                    <span className="text-[10px] font-black uppercase tracking-widest">Yêu cầu AI vẽ</span>
                                </div>
                                <textarea 
                                    value={query} 
                                    onChange={(e) => setQuery(e.target.value)} 
                                    placeholder="Ví dụ: Vẽ khối tròn bán kính 2 cao 4, vẽ ngôi sao 5 cánh màu đỏ..." 
                                    className="w-full min-h-[140px] p-5 rounded-3xl border-2 border-slate-100 bg-slate-50 focus:bg-white focus:ring-8 focus:ring-indigo-500/5 focus:border-indigo-500 outline-none transition-all text-sm font-bold"
                                />
                                <div className="space-y-3">
                                    <div className="flex justify-between items-center px-1">
                                        <span className="text-[10px] font-black text-slate-400 uppercase">Độ dày nét</span>
                                        <span className="text-indigo-600 font-black text-xs">{lineThickness}px</span>
                                    </div>
                                    <input type="range" min="1" max="13" value={lineThickness} onChange={(e) => setLineThickness(parseInt(e.target.value))} className="w-full accent-indigo-600" />
                                </div>
                                <button onClick={runAI} disabled={isGenerating} className="w-full h-16 bg-indigo-600 hover:bg-indigo-700 text-white rounded-[24px] font-black shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3 disabled:bg-slate-300">
                                    {isGenerating ? <div className="w-6 h-6 border-4 border-white/30 border-t-white rounded-full animate-spin"></div> : <i data-lucide="wand-2" className="w-6 h-6"></i>}
                                    DỰNG HÌNH AI
                                </button>
                            </div>
                        </aside>

                        <main className="flex flex-col gap-6">
                            <div className="ggb-container bg-slate-50 min-h-[700px] relative">
                                <div ref={containerRef} className="w-full h-[700px]"></div>
                            </div>
                            
                            <div className="bg-slate-900 text-white p-5 rounded-[2rem] flex flex-col md:flex-row justify-between items-center gap-4 shadow-2xl">
                                <div className="flex items-center gap-4">
                                    <div className="bg-slate-800 p-2.5 rounded-2xl text-indigo-400">
                                        <i data-lucide="terminal" className="w-6 h-6"></i>
                                    </div>
                                    <div className="flex flex-col">
                                        <span className="text-[10px] font-black uppercase text-slate-500 tracking-widest">Log Hệ thống</span>
                                        <span className="text-sm font-bold text-slate-200 italic line-clamp-1">{lastSummary}</span>
                                    </div>
                                </div>
                                <button onClick={initApplet} className="bg-indigo-600 hover:bg-red-500 px-8 py-3 rounded-2xl text-xs font-black transition-all uppercase">Xóa bảng vẽ</button>
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        // Khởi tạo app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        // Khởi tạo icons Lucide sau khi render
        setTimeout(() => lucide.createIcons(), 1000);
    </script>
</body>
</html>
